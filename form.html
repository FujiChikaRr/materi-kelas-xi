<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Account Baru</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #1e3c72, #2a5298); /* Gradasi biru kehitaman */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            max-width: 500px;
            background-color: rgba(0, 0, 0, 0.6); /* Transparansi hitam agar teks lebih jelas */
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2em;
            color: #f2f2f2;
            text-align: center;
        }

        h2 {
            color: #f2f2f2;
            margin-bottom: 10px;
        }

        label {
            font-size: 1em;
            display: block;
            margin-top: 10px;
            color: #f2f2f2;
        }

        input[type="text"], input[type="email"], select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1em;
        }

        input[type="radio"], input[type="checkbox"] {
            margin-right: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4da6ff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background-color: #3b8bcc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Buat Account Baru</h1>
        <h2>Sign Up Form</h2>
        <form>
            <label for="first-name">First name:</label>
            <input type="text" id="first-name" name="first-name">

            <label for="last-name">Last name:</label>
            <input type="text" id="last-name" name="last-name">

            <label>Gender:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male" style="display: inline;">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female" style="display: inline;">Female</label>

            <label for="nationality">Nationality:</label>
            <select id="nationality" name="nationality">
                <option value="indonesian">Indonesian</option>
                <option value="other">Other</option>
            </select>

            <label>Language Spoken:</label>
            <input type="checkbox" id="indonesian" name="language" value="indonesian">
            <label for="indonesian" style="display: inline;">Bahasa Indonesia</label>
            <input type="checkbox" id="english" name="language" value="english">
            <label for="english" style="display: inline;">English</label>
            <input type="checkbox" id="other" name="language" value="other">
            <label for="other" style="display: inline;">Other</label>

            <label for="bio">Bio:</label>
            <textarea id="bio" name="bio" rows="4"></textarea>

            <a href="welcome.html"class="button-link">Sign Up</a>
        </form>
    </div>
</body>
</html>
